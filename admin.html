<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/styles.css">
    <title>Painel Administrativo - Rifas</title>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>Gerenciador de Rifas</h1>
            <button class="btn" style="background: #ef4444; width: auto;" onclick="app.logout()">Sair</button>
        </div>

        <!-- Navegação por Abas -->
        <div class="auth-tabs" style="margin-bottom: 30px;">
            <button id="tab-raffles" class="active" onclick="app.showSection('raffles')">Minhas Rifas</button>
            <button id="tab-sales" onclick="app.showSection('sales')">Gerenciar Vendas</button>
        </div>

        <!-- Seção de Rifas -->
        <div id="section-raffles">
            <div id="form-raffle" class="admin-section">
                <h3>Criar Nova Rifa</h3>
                <input type="text" id="title" placeholder="Título">
                <input type="number" id="price" placeholder="Preço (R$)">
                <input type="number" id="total" placeholder="Qtd Números">
                <input type="text" id="creator_name" placeholder="Nome do Organizador">
                <input type="text" id="whatsapp_contact" placeholder="WhatsApp para Comprovantes (Ex: 11999999999)">
                <input type="text" id="pix_key" placeholder="Chave PIX para Recebimento">
                <button class="btn" onclick="app.saveRaffle()">Criar Rifa</button>
            </div>

            <h2 style="margin-bottom: 24px;">Minhas Rifas Ativas</h2>
            <div id="raffle-list" class="raffle-list-container"></div>
        </div>

        <!-- Seção de Vendas (Pendentes) -->
        <div id="section-sales" style="display: none;">
            <h2 style="margin-bottom: 24px;">Aprovações Pendentes</h2>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Rifa</th>
                            <th>Comprador</th>
                            <th>WhatsApp</th>
                            <th>Número</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="sales-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { _supabase } from './js/config.js';
        
        const app = {
            async checkUser() {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) {
                    window.location.href = 'login.html';
                }
                return user;
            },

            showSection(section) {
                document.getElementById('section-raffles').style.display = section === 'raffles' ? 'block' : 'none';
                document.getElementById('section-sales').style.display = section === 'sales' ? 'block' : 'none';
                
                document.getElementById('tab-raffles').classList.toggle('active', section === 'raffles');
                document.getElementById('tab-sales').classList.toggle('active', section === 'sales');

                if (section === 'raffles') {
                    this.fetchRaffles();
                } else {
                    this.fetchPendingSales();
                }
            },

            async saveRaffle() {
                const user = await this.checkUser();
                if (!user) return;

                const title = document.getElementById('title').value;
                const price = document.getElementById('price').value;
                const total = document.getElementById('total').value;
                const creator = document.getElementById('creator_name').value;
                const whatsapp = document.getElementById('whatsapp_contact').value;
                const pix = document.getElementById('pix_key').value;

                // 2. Insere a rifa passando o owner_id (ID do usuário)
                const { data, error } = await _supabase.from('raffles').insert([{ 
                    title, 
                    ticket_price: price, 
                    total_numbers: total, 
                    pix_key: pix,
                    creator_name: creator,
                    whatsapp_contact: whatsapp,
                    owner_id: user.id 
                }]);

                if (error) alert("Erro ao criar: " + error.message);
                else { alert("Sucesso!"); location.reload(); }
            },
            
            async logout() {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            },

            // Função para prevenir ataques XSS ao renderizar textos do banco
            escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            copyLink(url) {
                navigator.clipboard.writeText(url);
                alert("Link da rifa copiado com sucesso!");
            },

            shareWhatsapp(url, title) {
                const text = encodeURIComponent(`Olá! Participe da minha rifa: ${title}\nEscolha seus números aqui: ${url}`);
                const whatsappUrl = `https://wa.me/?text=${text}`;
                window.open(whatsappUrl, '_blank');
            },

            async deleteRaffle(id) {
                if (!confirm("Tem certeza que deseja excluir esta rifa? Todos os dados e tickets serão perdidos.")) return;

                const { error } = await _supabase.from('raffles').delete().eq('id', id);

                if (error) alert("Erro ao excluir: " + error.message);
                else {
                    alert("Rifa excluída com sucesso!");
                    this.fetchRaffles();
                }
            },

            async fetchPendingSales() {
                const user = await this.checkUser();
                
                // Primeiro pegamos os IDs das rifas que pertencem ao usuário
                const { data: userRaffles } = await _supabase.from('raffles').select('id').eq('owner_id', user.id);
                const raffleIds = userRaffles.map(r => r.id);

                // Buscamos os tickets pendentes dessas rifas
                const { data: tickets, error } = await _supabase
                    .from('tickets')
                    .select('*, raffles(title)')
                    .in('raffle_id', raffleIds)
                    .eq('status', 'pending')
                    .order('created_at', { ascending: false });

                const list = document.getElementById('sales-list');
                if (!tickets || tickets.length === 0) {
                    list.innerHTML = "<tr><td colspan='5' style='text-align:center; padding: 20px;'>Nenhuma venda pendente para aprovação.</td></tr>";
                    return;
                }

                list.innerHTML = tickets.map(ticket => `
                    <tr>
                        <td><strong>${this.escapeHTML(ticket.raffles.title)}</strong></td>
                        <td>${this.escapeHTML(ticket.buyer_name)}</td>
                        <td>${this.escapeHTML(ticket.buyer_phone)}</td>
                        <td><span class="badge" style="background: var(--primary); color: white;">${ticket.number_selected}</span></td>
                        <td>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn" style="background: var(--success); padding: 6px 12px; font-size: 0.8rem; width: auto;" onclick="app.updateTicketStatus('${ticket.id}', 'paid')">Confirmar</button>
                                <button class="btn" style="background: #ef4444; padding: 6px 12px; font-size: 0.8rem; width: auto;" onclick="app.updateTicketStatus('${ticket.id}', 'cancelled')">Recusar</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            },

            async updateTicketStatus(ticketId, newStatus) {
                const action = newStatus === 'paid' ? 'confirmar' : 'cancelar';
                if (!confirm(`Deseja realmente ${action} esta reserva?`)) return;

                let error;
                if (newStatus === 'paid') {
                    ({ error } = await _supabase.from('tickets').update({ status: 'paid' }).eq('id', ticketId));
                } else {
                    ({ error } = await _supabase.from('tickets').delete().eq('id', ticketId));
                }

                if (error) alert("Erro: " + error.message);
                else {
                    alert("Atualizado com sucesso!");
                    this.fetchPendingSales();
                }
            },

            async fetchRaffles() {
                const user = await this.checkUser();
                if (!user) return;

                const { data, error } = await _supabase
                    .from('raffles')
                    .select('*')
                    .eq('owner_id', user.id) // Segurança: Filtra apenas as rifas do dono
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error("Erro ao buscar rifas:", error.message);
                    return;
                }

                const list = document.getElementById('raffle-list');
                list.innerHTML = data.map(raffle => {
                    // Constrói a URL pública baseada na localização atual
                    const publicUrl = `${window.location.origin}${window.location.pathname.replace('admin.html', 'index.html')}?id=${raffle.id}`;
                    
                    const safeTitle = this.escapeHTML(raffle.title);
                    const safePrice = this.escapeHTML(raffle.ticket_price.toString());

                    return `
                        <div class="raffle-card">
                            <div class="raffle-card-content">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                                    <h3 style="margin:0">${safeTitle}</h3>
                                    <span class="badge">${raffle.status}</span>
                                </div>
                                <p class="raffle-price">R$ ${parseFloat(safePrice).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                <p class="raffle-info">${raffle.total_numbers} números no total</p>
                                
                                <div class="raffle-actions">
                                    <button class="btn" style="background: #64748b; flex: 1;" onclick="app.copyLink('${publicUrl}')">Link</button>
                                    <button class="btn" style="background: #22c55e; flex: 1;" onclick="app.shareWhatsapp('${publicUrl}', '${safeTitle}')">Zap</button>
                                    <a href="index.html?id=${raffle.id}" target="_blank" class="btn" style="background: var(--primary); text-decoration: none; flex: 1; text-align: center; display: flex; align-items: center; justify-content: center;">Ver</a>
                                    <button class="btn" style="background: #ef4444; flex: 1;" onclick="app.deleteRaffle('${raffle.id}')">Excluir</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        };
        window.app = app;
        app.checkUser();
        app.fetchRaffles();
    </script>
</body>
</html>
